name: Cleanup old branches (one-off)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-branches.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const keep = new Set(['main', 'gh-pages']);
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            let deleted = 0, failed = 0;
            for (const b of branches) {
              if (keep.has(b.name)) continue;
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${b.name}`,
                });
                deleted++;
                console.log('deleted', b.name);
              } catch (e) {
                failed++;
                console.log('FAILED', b.name, e.message);
              }
            }
            console.log(`Done: ${deleted} deleted, ${failed} failed, kept: ${[...keep].join(', ')}`);
