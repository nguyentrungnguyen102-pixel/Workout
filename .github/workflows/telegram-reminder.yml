name: Telegram workout reminder

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      test_all_variants:
        description: 'Gửi thử cả 4 mẫu tin ngay (bỏ qua giờ/thứ/chống trùng)'
        required: false
        type: boolean
        default: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard secrets
        id: guard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Reminder secrets not configured yet — skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.guard.outputs.ok == 'true'
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Send reminders
        if: steps.guard.outputs.ok == 'true'
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_ALL_VARIANTS: ${{ inputs.test_all_variants }}
        run: node telegram-reminder.mjs
